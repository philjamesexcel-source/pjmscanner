# ============================================================
#  MEMECOIN SCREENER — CONFIGURATION
#  Edit thresholds here — no rebuild needed.
#  Two strategies run simultaneously in the same pod.
#  Disable either strategy by setting enabled: false.
# ============================================================

scan_interval_minutes: 15

# ── STRATEGY A — Fast (Sniper) ────────────────────────────────
# Targets very new tokens with explosive early momentum.
# Higher risk tolerance. Smaller position sizes recommended.
strategy_a:
  enabled: true
  label: "⚡ FAST"
  age:
    min_minutes: 5
    max_hours: 24

  market_cap:
    min: 30000
    max: 3000000

  liquidity:
    min: 15000
    max: 500000
    liq_to_mc_min_pct: 5
    liq_to_mc_max_pct: 50

  volume:
    min_24h: 50000
    min_1h: 5000
    min_5m: 500
    vol_liq_min_ratio: 1.0
    vol_liq_hard_reject: 30.0

  price_change:
    min_1h_pct: -20
    min_24h_pct: 20
    max_24h_pct: 10000

  buy_sell:
    min_buy_ratio_1h: 0.52
    min_tx_count_1h: 15

  security:
    require_mint_renounced: true
    require_freeze_renounced: true
    allow_mutable_metadata: true
    max_rugcheck_score: 700

  holders:
    min_holders: 50
    max_top10_pct: 65
    max_single_wallet_pct: 20
    max_block0_snipe_pct: 50
    block0_hard_reject: false

  scoring:
    enabled: true
    min_score: 0.55
    weights:
      momentum: 0.35
      liquidity: 0.20
      buy_pressure: 0.25
      safety: 0.20

  pullback:
    min_pullback_pct: 15       # minimum drop from peak to trigger entry alert
    max_pullback_pct: 55       # maximum drop — beyond this is a breakdown not a pullback
    min_5m_vol_after_pullback: 1000   # must show volume recovering
    vol_recovery_ratio: 0.30   # 5m vol must be at least 30% of peak 5m vol
    max_hours_to_watch: 12     # stop watching for pullback after this many hours

  milestones:                  # alert when coin reaches these multipliers
    vs_alert_mc: [2, 5, 10]    # 2x, 5x, 10x vs MC at initial alert
    vs_entry: [2, 3, 5]        # 2x, 3x, 5x vs pullback entry price

# ── STRATEGY B — Moderate (Swing) ────────────────────────────
# Targets tokens with established momentum and pullback entries.
# Stricter security. Higher confidence signals.
strategy_b:
  enabled: true
  label: "🎯 SWING"
  age:
    min_hours: 6
    max_hours: 120             # 5 days

  market_cap:
    min: 100000
    max: 5000000

  liquidity:
    min: 40000
    max: 500000
    liq_to_mc_min_pct: 8
    liq_to_mc_max_pct: 40

  volume:
    min_24h: 200000
    min_1h: 10000
    min_5m: 2000
    vol_liq_min_ratio: 1.5
    vol_liq_hard_reject: 20.0

  price_change:
    min_1h_pct: -15
    min_24h_pct: 50
    max_24h_pct: 5000
    pullback_from_high_min_pct: 20
    pullback_from_high_max_pct: 60

  buy_sell:
    min_buy_ratio_1h: 0.52
    strong_buy_ratio_1h: 0.60
    min_tx_count_1h: 30
    min_tx_count_24h: 200

  security:
    require_mint_renounced: true
    require_freeze_renounced: true
    allow_mutable_metadata: false
    max_rugcheck_score: 500

  holders:
    min_holders: 200
    max_top10_pct: 50
    max_single_wallet_pct: 15
    max_block0_snipe_pct: 40
    block0_hard_reject: false

  scoring:
    enabled: true
    min_score: 0.62
    weights:
      momentum: 0.28
      liquidity: 0.20
      holder_growth: 0.18
      buy_pressure: 0.17
      safety: 0.17

  pullback:
    min_pullback_pct: 20
    max_pullback_pct: 60
    min_5m_vol_after_pullback: 2000
    vol_recovery_ratio: 0.35
    max_hours_to_watch: 48

  milestones:
    vs_alert_mc: [2, 5, 10]
    vs_entry: [2, 3, 5]

# ── GLOBAL ────────────────────────────────────────────────────
global:
  max_alerts_per_scan: 5
  summary_hours_utc: [10, 20]    # 13:00 and 23:00 EAT
  show_filter_failure_breakdown: true
  interim_report_frequency: daily  # daily | off

  chains:
    - solana

  logging:
    level: INFO
    log_to_file: true
    log_file: logs/screener.log
