# ============================================================
#  PJM SCANNER — KUBERNETES DEPLOYMENT
#  k3s · worker-contabo · Ubuntu 24.04
#
#  Two containers: scanner + dashboard
#  Code baked into image — only config/ mounted via ConfigMap
#
#  Apply order:
#    1. kubectl apply -f postgres.yaml (wait for 1/1 Running)
#    2. kubectl apply -f deployment.yaml
#
#  Before applying fill ALL REPLACE_WITH_* values.
#  Use deployment.local.yaml for real secrets (gitignored).
# ============================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: screener

---
apiVersion: v1
kind: Secret
metadata:
  name: scanner-secrets
  namespace: screener
type: Opaque
stringData:
  TELEGRAM_BOT_TOKEN:  "REPLACE_WITH_YOUR_BOT_TOKEN"
  TELEGRAM_CHANNEL_ID: "REPLACE_WITH_YOUR_CHANNEL_ID"
  HELIUS_RPC_URL:      "https://mainnet.helius-rpc.com/?api-key=REPLACE_WITH_YOUR_KEY"
  POSTGRES_HOST:       "postgres.screener.svc.cluster.local"
  POSTGRES_PORT:       "5432"
  POSTGRES_DB:         "screener"
  POSTGRES_USER:       "screener"
  POSTGRES_PASSWORD:   "REPLACE_WITH_STRONG_PASSWORD"

---
# All config files in one ConfigMap.
# Edit thresholds here and restart — NO rebuild needed.
apiVersion: v1
kind: ConfigMap
metadata:
  name: scanner-config
  namespace: screener
data:
  global_config.yaml: |
    version: "1.0.0"
    enable_strategy_a: true
    enable_strategy_b: true
    enable_strategy_c: true
    scan_interval_seconds: 120
    tracker_interval_seconds: 60
    networks:
      solana:
        enabled: true
        gecko_network: solana
    filters:
      min_liquidity_usd: 20000
      max_top_holder_percent: 20
      max_dev_wallet_percent: 10
      min_holders: 120
      min_txns_5m: 80
      min_volume_5m_usd: 10000
      min_buy_sell_ratio: 1.1
      max_fake_volume_ratio: 0.3
      require_lp_locked: true
      rugcheck_pass_required: true
      max_rugcheck_score: 800
    scoring:
      liquidity_weight: 0.20
      volume_weight: 0.20
      momentum_weight: 0.25
      holder_distribution_weight: 0.15
      wallet_activity_weight: 0.10
      risk_weight: 0.10
      min_score_to_alert: 60
    alerts:
      max_per_scan: 10
      cooldown_minutes: 60
      summary_hours_utc: [10, 20]
      show_filter_failure_breakdown: true
      interim_report_frequency: daily
    milestones:
      vs_detection: [2, 5, 10, 20]
      vs_entry: [2, 3, 5, 10]
    health:
      port: 9090
      stale_scan_threshold_minutes: 10
    config_management:
      max_versions_kept: 10
      auto_revert_on_crash: true
      crash_threshold: 3
      stability_window_minutes: 5
    logging:
      level: INFO
      log_to_file: true
      log_file: logs/pjmscanner.log

  strategy_a.yaml: |
    enabled: true
    label: "🛡️ SAFE"
    age:
      min_hours: 6
      max_hours: 72
    market_cap:
      min_usd: 150000
      max_usd: 3000000
    liquidity:
      min_usd: 50000
      require_lp_locked: true
      min_lp_locked_pct: 80
      liq_to_mc_min_pct: 8
    volume:
      min_5m_usd: 15000
      min_1h_usd: 80000
      min_24h_usd: 500000
    transactions:
      min_5m: 120
      min_1h: 800
    pressure:
      min_buy_sell_ratio: 1.2
      strong_buy_sell_ratio: 1.5
    holders:
      min_count: 300
      max_top_holder_pct: 15
      max_dev_wallet_pct: 8
      max_block0_snipe_pct: 20
    security:
      require_mint_renounced: true
      require_freeze_renounced: true
      allow_mutable_metadata: false
      max_rugcheck_score: 500
    drawdown:
      max_from_peak_pct: 40
    pullback:
      enabled: true
      min_pct: 20
      max_pct: 45
      min_5m_vol_usd: 5000
      min_vol_recovery_ratio: 0.6
      watch_window_hours: 48
    scoring:
      min_score: 65
      liquidity_weight: 0.25
      volume_weight: 0.20
      momentum_weight: 0.20
      holder_distribution_weight: 0.15
      risk_weight: 0.15
      wallet_activity_weight: 0.05

  strategy_b.yaml: |
    enabled: true
    label: "⚡ MOMENTUM"
    age:
      min_minutes: 60
      max_hours: 24
    market_cap:
      min_usd: 30000
      max_usd: 500000
    liquidity:
      min_usd: 15000
      require_lp_locked: false
      allow_bonding_curve: true
      liq_to_mc_min_pct: 4
    volume:
      min_5m_usd: 12000
      min_15m_usd: 25000
      min_1h_usd: 50000
    transactions:
      min_5m: 100
      min_15m: 250
    pressure:
      min_buy_sell_ratio: 1.3
      strong_buy_sell_ratio: 1.6
      min_new_wallets_5m: 25
    holders:
      min_count: 150
      max_top_holder_pct: 18
      max_dev_wallet_pct: 10
      max_block0_snipe_pct: 40
    security:
      require_mint_renounced: true
      require_freeze_renounced: true
      allow_mutable_metadata: true
      max_rugcheck_score: 700
    momentum:
      threshold: 0.75
      min_price_change_5m_pct: 2
      min_price_change_1h_pct: 15
      max_price_change_1h_pct: 300
    pullback:
      enabled: true
      min_pct: 20
      max_pct: 40
      min_vol_recovery_ratio: 0.7
      watch_window_hours: 8
    scoring:
      min_score: 60
      momentum_weight: 0.35
      volume_weight: 0.25
      liquidity_weight: 0.15
      risk_weight: 0.10
      holder_distribution_weight: 0.10
      wallet_activity_weight: 0.05

  strategy_c.yaml: |
    enabled: true
    label: "🌊 SECOND WAVE"
    age:
      min_hours: 6
      max_days: 5
    market_cap:
      min_usd: 100000
      max_usd: 5000000
    liquidity:
      min_usd: 40000
      require_lp_locked: true
      liq_to_mc_min_pct: 5
    volume:
      min_1h_usd: 50000
      min_24h_usd: 300000
    transactions:
      min_1h: 400
    pressure:
      min_buy_sell_ratio: 1.1
    holders:
      min_count: 400
      max_top_holder_pct: 15
      max_dev_wallet_pct: 8
    security:
      require_mint_renounced: true
      require_freeze_renounced: true
      allow_mutable_metadata: false
      max_rugcheck_score: 500
    second_wave:
      min_previous_pump_x: 2.0
      max_drawdown_from_peak_pct: 60
      consolidation_range_pct: 25
      min_volume_1h_usd: 50000
      reaccumulation_required: true
    reaccumulation:
      min_buy_sell_ratio_1h: 1.1
      min_volume_increase_pct: 20
    pullback:
      enabled: true
      min_pct: 15
      max_pct: 35
      min_5m_vol_usd: 8000
      watch_window_hours: 48
    scoring:
      min_score: 62
      momentum_weight: 0.20
      liquidity_weight: 0.20
      holder_distribution_weight: 0.20
      volume_weight: 0.20
      risk_weight: 0.12
      wallet_activity_weight: 0.08

  wallet_tracking.yaml: |
    enabled: true
    qualification:
      min_wallet_roi: 2.5
      min_successful_trades: 5
      entry_mc_min_usd: 20000
      entry_mc_max_usd: 500000
      min_win_rate: 0.55
    scoring:
      wallet_win_rate_weight: 0.35
      average_roi_weight: 0.35
      early_entry_accuracy_weight: 0.30
      min_wallet_score: 0.60
    alerts:
      min_wallets_buying: 2
      min_buy_size_usd: 500
      alert_on_single_whale: true
      whale_score_threshold: 0.85
    tracking:
      max_tracked_wallets: 500
      refresh_wallet_scores_hours: 24
      helius_lookback_transactions: 100
      daily_reset_hour_utc: 0
    data_sources:
      helius:
        enabled: true
        max_tx_per_wallet: 100

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pjm-scanner
  namespace: screener
  labels:
    app: pjm-scanner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pjm-scanner
  template:
    metadata:
      labels:
        app: pjm-scanner
    spec:
      nodeSelector:
        kubernetes.io/hostname: worker-contabo

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:

        # ── Scanner — main loop + tracker + wallet tracker ────
        - name: scanner
          image: covenantwealth/pjm-scanner:v1
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          envFrom:
            - secretRef:
                name: scanner-secrets
          env:
            - name: CONFIG_DIR
              value: /app/config
          volumeMounts:
            - name: config-volume
              mountPath: /app/config
            - name: logs
              mountPath: /app/logs
            - name: config-versions
              mountPath: /app/config_versions
          ports:
            - containerPort: 9090
              name: health
          livenessProbe:
            httpGet:
              path: /
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "192Mi"
              cpu: "150m"
            limits:
              memory: "512Mi"
              cpu: "600m"

        # ── Dashboard — Flask UI on port 8080 ─────────────────
        - name: dashboard
          image: covenantwealth/pjm-scanner:v1
          imagePullPolicy: Always
          command: ["python", "dashboard/app.py"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          envFrom:
            - secretRef:
                name: scanner-secrets
          env:
            - name: CONFIG_DIR
              value: /app/config
          ports:
            - containerPort: 8080
              name: dashboard
          volumeMounts:
            - name: config-volume
              mountPath: /app/config
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "192Mi"
              cpu: "200m"

      volumes:
        - name: config-volume
          configMap:
            name: scanner-config
            items:
              - key: global_config.yaml
                path: global_config.yaml
              - key: strategy_a.yaml
                path: strategy_a.yaml
              - key: strategy_b.yaml
                path: strategy_b.yaml
              - key: strategy_c.yaml
                path: strategy_c.yaml
              - key: wallet_tracking.yaml
                path: wallet_tracking.yaml
        - name: logs
          emptyDir: {}
        - name: config-versions
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: scanner-dashboard
  namespace: screener
spec:
  selector:
    app: pjm-scanner
  ports:
    - name: dashboard
      port: 8080
      targetPort: 8080
    - name: health
      port: 9090
      targetPort: 9090
